defaults:
  - point

overlay_color: [0.80, 0.96, 0.90, 1.0]

xml:
  overrides:
    - mujoco:
        - asset:
            - material:
                - name: ${parent:xml}_mat
                - emission: "1.5"
                - rgba: "0.52 0.84 0.80 1.0"
            - material:
                - name: ${parent:xml}_direction_mat
                - emission: "1.2"
                - rgba: "0.93 0.82 0.48 1.0"
        - worldbody:
            - body:
                - name: ${parent:xml}_body
                - geom:
                    - name: ${parent:xml}_geom
                    - rgba: "0.24 0.74 0.72 0.10"
