# @package _global_

defaults:
  - tracking
  - override /env/mazes@env.mazes.maze: SHALLOWS
  - override /env/agents@env.agents.agent: point_cambria
  - override /env/agents@env.agents.goal0:
      - object_sphere_textured_goal
      - point_bioluminescent
      - point_seeker_random
  - override /env/agents@env.agents.adversary0:
      - object_sphere_textured_adversary
      - point_bioluminescent
      - point_seeker_random

env:
  xml:
    _target_: cambrian.utils.cambrian_xml.MjCambrianXML.parse
    _convert_: all
    xml_string: ${read:${path:${package:},models,scene_shallows.xml}}

  agents:
    agent:
      overlay_color: [0.80, 0.96, 0.90, 1.0]
    goal0:
      custom:
        frequency: 20
        texture_cmap: blackwhite
      instance:
        speed: -0.55
    adversary0:
      custom:
        frequency: 30
        texture_cmap: blackwhite
      instance:
        speed: -0.65
